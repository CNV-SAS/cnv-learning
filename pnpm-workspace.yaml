# Settings de supply chain de pnpm 11.
# IMPORTANTE: pnpm 11 NO lee non-auth settings de .npmrc. Toda config
# de pnpm vive aquí (camelCase). Solo registry/auth en .npmrc.

# Ventana de cuarentena: 24h antes de instalar versión nueva.
# Combinado con ignoreScripts: true y allowBuilds explícito, da defensa
# razonable contra ataques tipo Mini Shai-Hulud sin la fricción de un
# threshold de 7 días que bloquea deps transitivas oficiales legítimas
# (caso verificado: baseline-browser-mapping de web-platform-dx/W3C).
minimumReleaseAge: 1440

# Bloquear deps transitivas de fuentes exóticas (git, tarballs URL).
blockExoticSubdeps: true

# Bloquear scripts post-install de TODOS los packages excepto los
# explícitamente whitelisted abajo. Vector principal de Mini Shai-Hulud.
ignoreScripts: true

# Pinear versiones exactas (sin ^ ni ~) cuando se agrega un package.
# Evita upgrades silenciosos a versiones recién publicadas.
saveExact: true

# Whitelist de packages cuyos install scripts SÍ pueden correr.
# Solo paquetes verificados que necesitan compilar binarios nativos.
# pnpm 11 usa allowBuilds (object con booleans), no onlyBuiltDependencies
# (array deprecated).
allowBuilds:
  sharp: true
  unrs-resolver: true
  "@sentry/cli": true
  supabase: true   # CLI oficial Supabase, postinstall descarga binario nativo por plataforma desde GitHub releases. Mantenido por kiwicopple (CEO Supabase) + etienne_supa.
  esbuild: true    # Required by tsx, used by supabase/seed.ts y futuros scripts TypeScript. Pidió aprobación interactiva durante Bloque 1.21 (seed). Bundler oficial de Evan Wallace, dep transitiva de Next/Vite/Vitest, miles de millones de descargas semanales.

# Overrides de versiones para parchar vulnerabilidades antes de que las
# deps padre suban sus pins. Cada override requiere justificación.
overrides:
  # postcss < 8.5.10 vulnerable a XSS via </style> en stringify output
  # (GHSA-qx2v-qp2m-jg93). Riesgo real bajo (build-time, no runtime con
  # input de usuario), pero el fix es trivial.
  postcss: "8.5.10"
